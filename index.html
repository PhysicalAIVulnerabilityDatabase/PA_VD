<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physical AI Vulnerability Explorer</title>
  <style>body{font-family:system-ui;margin:20px;}</style>
</head>
<body>
  <h1>Physical AI Vulnerability Explorer - Debug Mode</h1>
  <pre id="log">Loading...</pre>

  <script>
    const log = document.getElementById('log');

    function addLog(msg) {
      log.textContent += msg + "\n";
      console.log(msg);
    }

    async function testLoad() {
      addLog("🚀 Starting test...");

      try {
        addLog("Fetching index.json...");
        const res = await fetch('index.json?v=' + Date.now());
        addLog(`Status: ${res.status} ${res.statusText}`);

        if (res.ok) {
          const data = await res.json();
          addLog(`✅ SUCCESS! Loaded ${data.length} vulnerabilities`);
          addLog("First CVE: " + (data[0]?.cve_id || 'N/A'));
          console.table(data.slice(0,5));
        } else {
          addLog("❌ Failed to load index.json");
        }
      } catch(e) {
        addLog("❌ Error: " + e.message);
      }
    }

    window.onload = testLoad;
  </script>
</body>
</html>
